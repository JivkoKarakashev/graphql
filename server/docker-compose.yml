services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_board
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_board

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_board"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  express-api:
    build:
      context: .
      target: dev

    container_name: express_api
    restart: "no"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_board

    ports:
      - "3000:3000"
      # - "5555:5555"

    volumes:
      - .:/app
      - /app/node_modules

    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate dev &&
      npm run start:dev
      "