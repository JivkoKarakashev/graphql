services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    env_file:
      - .env.db
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  express-api:
    build:
      context: .
      target: dev

    container_name: express_api
    restart: "no"

    env_file:
      - .env.development

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    volumes:
      - .:/app:cached
      - /app/node_modules

    command: >
      sh -c "
      npx prisma migrate deploy &&
      npx prisma generate &&
      npm run start:docker
      "