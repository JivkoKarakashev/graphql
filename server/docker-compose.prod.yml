services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env.db
  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  express-api:
    build:
      context: .
      target: prod

    env_file:
      - .env.production

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    command: node dist/server.js